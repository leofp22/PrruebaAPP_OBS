<!DOCTYPE html>
<html>
<head>
    <title>Buscador de Verduras</title>
</head>
<body>
    <h2>Consultar base de datos de verduras</h2>
    <input type="text" id="busqueda" placeholder="Ej: Espinaca">
    <button onclick="buscarVerdura()">Consultar</button>

    <div id="resultado" style="margin-top: 20px;"></div>

    <script>
        let dbVerduras = [];

        // Cargamos el JSON al iniciar
        fetch('verduras.json')
            .then(response => response.json())
            .then(data => { dbVerduras = data; });

        function buscarVerdura() {
            const query = document.getElementById('busqueda').value.toLowerCase();
            const res = dbVerduras.find(v => v.nombre.toLowerCase() === query);
            
            const div = document.getElementById('resultado');
            if (res) {
                div.innerHTML = `<strong>${res.nombre}</strong><br>
                                 Calorías: ${res.calorias}<br>
                                 Índice Glucémico: ${res.ig}<br>
                                 Rubro: ${res.rubro}`;
            } else {
                div.innerHTML = "No se encontró esa verdura.";
            }
        }
    </script>
</body>
</html>
